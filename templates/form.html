<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lead Form</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    form { max-width: 700px; }
    input, textarea, select { width: 100%; padding: 10px; margin: 8px 0 16px; box-sizing: border-box; }
    button { padding: 10px 18px; cursor: pointer; margin-right: 10px; }
    a { text-decoration: none; }
    #cameraSection, #previewSection, #ocrSection {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      max-width: 700px;
    }
    video, canvas, img {
      width: 100%;
      max-width: 500px;
      border: 1px solid #ccc;
      border-radius: 8px;
      display: block;
      margin-bottom: 12px;
    }
    #ocrText {
      white-space: pre-wrap;
      background: #f7f7f7;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      min-height: 100px;
    }
    .row-buttons { margin-bottom: 20px; }
    .small { color: #666; font-size: 14px; }
    .status { font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Create Lead</h2>

  <div class="row-buttons">
    <button type="button" onclick="startCamera()">Open Camera</button>
    <button type="button" onclick="stopCamera()">Stop Camera</button>
    <button type="button" onclick="captureImage()">Capture Visiting Card</button>
  </div>

  <div id="cameraSection">
    <h3>Camera</h3>
    <video id="video" autoplay playsinline></video>
    <div class="small">Point the camera at the visiting card, then click Capture Visiting Card.</div>
  </div>

  <div id="previewSection">
    <h3>Captured Image</h3>
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="preview" style="display:none;" alt="Captured preview">
    <button type="button" onclick="runOCR()">Run OCR & Autofill</button>
    <div id="ocrStatus" class="status"></div>
  </div>

  <div id="ocrSection">
    <h3>Extracted OCR Text</h3>
    <div id="ocrText"></div>
  </div>

  <form method="POST" action="/submit">
    <label>Name</label>
    <input type="text" name="name" id="name">

    <label>Company</label>
    <input type="text" name="company" id="company">

    <label>Job Title</label>
    <input type="text" name="job_title" id="job_title">

    <label>Email</label>
    <input type="email" name="email" id="email">

    <label>Source</label>
    <select name="source" id="source">
      <option value="Website">Website</option>
      <option value="Google Form">Google Form</option>
      <option value="Visiting Card">Visiting Card</option>
      <option value="Manual">Manual</option>
    </select>

    <label>Description / Prompt</label>
    <textarea name="description" id="description" rows="6"></textarea>

    <button type="submit">Submit Lead</button>
  </form>

  <p><a href="/dashboard">Go to Dashboard</a></p>

  <script>
    let stream = null;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });
        document.getElementById("video").srcObject = stream;
      } catch (err) {
        alert("Unable to access camera: " + err.message);
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      document.getElementById("video").srcObject = null;
    }

    function captureImage() {
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const preview = document.getElementById("preview");

      if (!video.videoWidth || !video.videoHeight) {
        alert("Camera not ready yet. Please wait a moment and try again.");
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = canvas.toDataURL("image/png");
      preview.src = imageData;
      preview.style.display = "block";
    }

    async function runOCR() {
      const preview = document.getElementById("preview");
      const status = document.getElementById("ocrStatus");
      const ocrTextBox = document.getElementById("ocrText");

      if (!preview.src) {
        alert("Please capture the visiting card image first.");
        return;
      }

      status.innerText = "Running OCR... please wait.";
      ocrTextBox.innerText = "";

      try {
        const result = await Tesseract.recognize(preview.src, "eng");
        const rawText = result.data.text || "";

        ocrTextBox.innerText = rawText;
        status.innerText = "OCR completed. Parsing details...";

        fillFormFromOCR(rawText);

        status.innerText = "Details extracted and form auto-filled.";
      } catch (error) {
        console.error(error);
        status.innerText = "OCR failed.";
        alert("OCR failed: " + error.message);
      }
    }

    function fillFormFromOCR(rawText) {
      const lines = rawText
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0);

      const email = extractEmail(rawText);
      const phone = extractPhone(rawText);
      const jobTitle = extractJobTitle(lines);
      const company = extractCompany(lines, email, phone, jobTitle);
      const name = extractName(lines, company, jobTitle, email, phone);

      document.getElementById("name").value = name || "";
      document.getElementById("company").value = company || "";
      document.getElementById("job_title").value = jobTitle || "";
      document.getElementById("email").value = email || "";
      document.getElementById("source").value = "Visiting Card";

      let descriptionText = "Lead created from visiting card OCR.\n\n";
      if (phone) descriptionText += `Phone: ${phone}\n`;
      descriptionText += "\nRaw OCR Text:\n" + rawText;

      document.getElementById("description").value = descriptionText;
    }

    function extractEmail(text) {
      const match = text.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i);
      return match ? match[0] : "";
    }

    function extractPhone(text) {
      const match = text.match(/(\+?\d[\d\s\-()]{7,}\d)/);
      return match ? match[0].trim() : "";
    }

    function extractJobTitle(lines) {
      const knownTitles = [
        "manager", "engineer", "director", "developer", "analyst", "consultant",
        "officer", "executive", "founder", "ceo", "cto", "coo", "president",
        "architect", "specialist", "sales", "marketing", "lead", "head"
      ];

      for (const line of lines) {
        const lower = line.toLowerCase();
        if (knownTitles.some(title => lower.includes(title))) {
          return line;
        }
      }
      return "";
    }

    function extractCompany(lines, email, phone, jobTitle) {
      const badWords = ["www", ".com", "@", "mobile", "phone", "email", "fax"];
      for (let i = lines.length - 1; i >= 0; i--) {
        const line = lines[i];
        const lower = line.toLowerCase();

        if (
          line === email ||
          line === phone ||
          line === jobTitle ||
          badWords.some(w => lower.includes(w))
        ) {
          continue;
        }

        if (line.length > 2 && line.length < 60) {
          return line;
        }
      }
      return "";
    }

    function extractName(lines, company, jobTitle, email, phone) {
      for (const line of lines) {
        const lower = line.toLowerCase();

        if (
          line === company ||
          line === jobTitle ||
          line === email ||
          line === phone ||
          lower.includes("@") ||
          lower.includes("www") ||
          /\d/.test(line)
        ) {
          continue;
        }

        const words = line.split(" ").filter(Boolean);
        if (words.length >= 2 && words.length <= 4) {
          return line;
        }
      }
      return "";
    }
  </script>
</body>
</html>
